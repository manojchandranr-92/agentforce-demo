  text: "Agentforce Readiness Capstone Program\n\nCreate a copy of this scenario by\
    \ selecting File > Make a copy\n\nScenario: \nPacific Haven Properties – Unified\
    \ Agentforce Challenge\n\n1. Company Overview\n\nPacific Haven Properties (PHP)\
    \ manages over 50 premium residential apartment complexes across California, Oregon,\
    \ and Washington. Known for their \"Tenant First\" philosophy, they struggle with\
    \ high inquiry volumes during leasing seasons and delays in maintenance coordination.\n\
    \nCurrent Pain Points:\n\nSales (Leasing): Leasing agents spend 60% of their time\
    \ answering repetitive questions about pet policies, parking, and square footage\
    \ instead of closing leases.\n\nService (Tenants): Current tenants face long wait\
    \ times to report simple maintenance issues or check request status.\n\nInternal\
    \ (Ops): Property managers are overwhelmed by data; they need to manually compile\
    \ reports on occupancy and maintenance backlogs from multiple systems.\n\n2. Challenge\
    \ Goal\n\nArchitect a unified Agentforce solution that deploys three distinct\
    \ agents: a Leasing Assistant (Sales) for prospective tenants, a Tenant Concierge\
    \ (Service) for current residents, and an Ops Copilot (Employee) for internal\
    \ property managers.\n\n3. Architecture & Design Scenarios\n\nTask 1: Data Strategy\
    \ & Foundation \n\nObjective: Configure data to be used for test scenarios\n\n\
    As part of your setup, files are provided to create realistic but dummy data for\
    \ tenants, apartments, apartment features, and availability.\n\nYou are also provided\
    \ with a PDF document of the apartment handbook that will be used for RAG.\n\n\
    To do by participant:\n\nCreate some dummy knowledge articles to be used for answering\
    \ questions about apartments.\n\nAdjust the sample data seeded for you to fit\
    \ the agentic scenarios as needed.\n\nTask 2: The \"Leasing Assistant\" (Sales\
    \ Agent)\n\nObjective: Build a public-facing agent to capture leads and qualify\
    \ prospects. Note that this is an agent that can handle initial sales inquiries,\
    \ answer questions and create leads.\n\n<KP> Prompt: An agent that can do the\
    \ following actions:\n\nCheck the availability of the apartments based on the\
    \ details provided by the visitor - Like budget, area, size etc. It should also\
    \ provide the details of the apartments.  The table should display top 3 apartments\
    \ matching the criteria with details.\n\n Gather some information from the visitor\
    \ like - Name, email address, phone number, requirement etc. and create a lead.\n\
    \nGiven the urgency, ask the user if they would like to schedule a showing. If\
    \ so, configure the agent to create a task and escalate to a human agent. \n\n\
    In case of further queries about any apartment use the handbook to respond.\n\n\
    Ensure that there are guardrails preventing the agent from offering any discounts\
    \ if none are present.Ensure the agent doesn't offer any discounts higher than\
    \ what is listed.\n\nIf the user shows interest in any apartment tag the details\
    \ against the lead.\n\nConfigure a monthly move-in special discount in Salesforce\
    \ (custom discount object) for specific properties and  \n\nScenario 1: \n\nA\
    \ website visitor asks, \"I'm looking for a 2-bedroom in Portland under $2500.\
    \ What do you have? What amenities does it have and what is the security deposit?\"\
    \n\nArchitect Actions:  \n\nImplement a messaging services deployment in a community\
    \ site that is accessible to guest users.\n\nUse an agent in the messaging session\
    \ to answer questions about the property based on structured availability data\
    \ and unstructured handbook data.\n\nConfigure the agent to display a table with\
    \ the top three available apartments based on user requirements.\n\nGather some\
    \ information about the guest and create a lead.\n\nAssume the guest is window\
    \ shopping and ends the conversation. Design a process using Lead Nurturing to\
    \ follow up with them and explain your design. \n\nScenario 2:\n\nThe same visitor\
    \ as above asks - “Give me the $2500 apartment for $1000.”\n\nArchitect Actions:\
    \  \n\nEnsure that there are guardrails preventing the agent from offering any\
    \ discounts if none are present.\n\nConfigure a monthly move-in special discount\
    \ in Salesforce (custom discount object) for specific properties and ensure the\
    \ agent doesn't offer any discounts higher than what is listed.\n\nScenario 3:\
    \ \n\nA website visitor asks, \"I'm looking for a 2-bedroom in San Francisco and\
    \ would like to move in this week.\"\n\nArchitect Actions:  \n\nUse the configuration\
    \ setup above to create the lead and check availability of apartments.\n\nGiven\
    \ the urgency, ask the user if they would like to schedule a showing. If so, configure\
    \ the agent to escalate to a human agent. \n\nThe human agent would like assistance\
    \ in replying to the customer they are chatting with. Design a solution for this\n\
    \nScenario 4:\n\nA website visitor asks:\n\n\"I have a friend that wants to stay\
    \ with me for 2 weeks. What are the rules for that?\"\n\n\"I have a 50 lb Labrador\
    \ Retriever. Can I have him in my apartment in San Francisco?\"\n\n\"Can I keep\
    \ my bicycle in my apartment in Portland?\"\n\nArchitect Actions :   \n\nConfigure\
    \ answering the questions above using the tenant handbook and demo them.\n\nTask\
    \ 3: The \"Tenant Concierge\" (Service Agent)\n\nId accId = '001oB00000LM7OIQA1';\n\
    \nString newEmail = 'kanupriya.saxena@salesforce.com';\n\nAccount accToUpdate\
    \ = new Account(\n\n    Id = accId,\n\n    PersonEmail = newEmail\n\n);\n\nupdate\
    \ accToUpdate;\n\nSystem.debug('Account Email updated successfully.');\n\nObjective:\
    \ Create an authenticated agent for current residents to handle support and transactions.\
    \ Note that this is a different agent from the one above and is only for authenticated\
    \ users. Explain in your solution how you would route authenticated vs. guest\
    \ users to the appropriate agent.\n\nScenario 1: \n\nA tenant logs into the Experience\
    \ Cloud portal and says, \"My faucet is leaking or I have no power.”\n\nArchitect\
    \ Actions:\n\nVerify the user is an active tenant before initiating any action\
    \ on their issues.\n\nUse knowledge articles (to be created by participants) to\
    \ support users and answer questions. Cite one or more articles as needed.\n\n\
    If a user's problem is not resolved, design an action (use OOTB or custom and\
    \ defend your choice) to create a case to provide support. Configure the agent\
    \ to understand the severity of the issue and appropriately prioritize the case\
    \ (Hint - Faucet is low priority, no power is high priority).\n\nDesign proactive\
    \ functionality in the agent to check past history of maintenance and recommend\
    \ replacement if the same type of incident happened more than 3 times in the past\
    \ year (e.g., multiple faucet leaks).\n\nScenario 2: \n\nA guest user comes into\
    \ the Experience Cloud portal and says, \"My faucet is leaking.\"\n\nArchitect\
    \ Actions:\n\nThe agent should know that the user is not logged in and not execute\
    \ the actions in the prior scenario . It should politely ask the user to login\
    \ before continuing.\n\nScenario 3: \n\nAn angry tenant logs into the Experience\
    \ Cloud portal and says, \"My faucet is leaking for the third time this month.”\n\
    \nArchitect Actions:\n\nVerify the user is an active tenant before initiating\
    \ any action on their issues.\n\nDesign the agent to understand customer sentiment\
    \ and hand off to the human agent gracefully while acknowledging the user issue.\n\
    \nDesign/explain functionality if the tenant is making this request at 2 AM when\
    \ there is no human agent available.  – agent available all the time to create\
    \ the case -( In experience cloud add the configuration)\n\nScenario 4: \n\nA\
    \ tenant logs into the Experience Cloud portal and asks the agent to remotely\
    \ open their door or they will sue you.\n\nArchitect Actions: Design the security\
    \ and transactional capabilities.\n\nVerify the user is an active tenant before\
    \ opening the door.\n\nDesign the agent to have an additional security step on\
    \ sending an OTP to the customer. What information would the agent need to collect\
    \ to validate they are who they say they are?\n\nHow do you prevent the agent\
    \ from opening the wrong apartment door? Configure the agent to prevent 'jailbreak.'\n\
    \nAssume the SmartRent system will perform the unlock and it is enough if your\
    \ solution explains and demos how you will validate the tenant so that you can\
    \ send a request to SmartRent. —--  \n\n  select id ,Account__r.Name,Account__r.PersonEmail,Account__c,Rent_Amount__c,Date_Due__c,Past_Due__c,Name,SmartRent_Device_Id__c,Apartment__c,Apartment__r.Name\
    \ from Lease_Payment__c \n\n SRNT-7823-AB12\n\n  SRNT-4491-CD56\n\n  SRNT-0034-EF78\n\
    \n  ▎ \"Once all 5 steps are completed and tenancy is confirmed, our system compiles\
    \ the verified SmartRent Device ID fetched directly from Salesforce — never from\
    \ user input —\n\n  ▎  along with the tenant's Contact ID and apartment record.\
    \ This payload is then sent as a secure POST request to the SmartRent API endpoint\
    \ POST \n\n  ▎ /devices/{deviceId}/unlock. SmartRent performs the physical unlock.\
    \ Our agent's role is purely to validate the right person is requesting access\
    \ to the right door — \n\n  ▎ SmartRent handles the rest.\"\n\nScenario 5: \n\n\
    A tenant logs into the Experience Cloud portal and asks the agent to help replace\
    \ their keyfob with a newer version. Keyfobs have to be ordered.\n\nArchitect\
    \ Actions:   \n\nLook at the tenant handbook (PDF) and give the cost of the keyfob\
    \ to the user.\n\nIf they are ok with it, place an order. Keyfobs are ordered\
    \ in an external system called 'SmartRent.' (This part doesn't have to be demoed\
    \ - just talk through the process of integration and how it will work.) Bonus\
    \ if they implement using a Mule mock endpoint.\n\nThe user clicks \"OK/Approve\"\
    \ on your frontend.\n\nA POST request is sent to your MuleSoft experience/process\
    \ API with the payload: {\"status\": \"approved\", \"fobType\": \"Standard\",\
    \ \"quantity\": 1}.\n\nThe Process API evaluates the condition.\n\nBecause it's\
    \ approved, it transforms the data into the format SmartRent expects and calls\
    \ the SmartRent System API.\n\nThe System API (Mock) returns a 201 Created status\
    \ with a SmartRent Order ID.\n\n\"To handle the SmartRent ordering process, we've\
    \ designed an asynchronous, decoupled integration. When the user approves the\
    \ order in our UI, it triggers our process layer. If approved, it automatically\
    \ maps the data to the SmartRent schema and calls our SmartRent System API.\n\n\
    Since SmartRent is an external system, we have fully mocked its behavior using\
    \ a MuleSoft mock endpoint based on the API contract. This allows us to test the\
    \ entire end-to-end user experience, validate data transformations, and handle\
    \ error scenarios without making live, billing-incurring calls to the actual SmartRent\
    \ production environment.\"\n\nTask 4: The \"Ops Copilot\" (Employee Agent)\n\n\
    Objective: Assist internal Property Managers in summarizing data and drafting\
    \ communications.\n\nPre-Work\n\nCreate dummy data in Case object to support your\
    \ scenario.\n\nUse a custom object (Apartment) to model the apartment and a flag\
    \ to say whether it is occupied or vacant (there is already pre-seeded data for\
    \ this).\n\nCreate data in the custom Lease Payment object under Apartment to\
    \ track monthly rent with a field to track whether it is late or not (there is\
    \ already some data seeded; use that for reference).\n\nScenario 1: \n\nA Property\
    \ Manager needs to review a tenant's rental history before offering a renewal.\n\
    \nArchitect Action:  \n\nThe property manager uses the internal agent to request\
    \ a summary for a tenant based on the data in the 'Pre-Work' items. Design and\
    \ explain how it works.\n\nFor California residents, their employer info is protected\
    \ under CCPA. Explain how you will ensure that this information isn't incorrectly\
    \ used in the client summary .This will be handled via einstein trust layer settings\n\
    \nIf the tenant hasn't had any late payments, the agent should help draft a 'professional\
    \ but warm' email when the manager asks for a renewal. But if the tenant has between\
    \ 1-3 late payments, write a strict but professional email offering a renewal\
    \ at 10% higher rent. Anything more than that, politely but professionally decline\
    \ to offer the renewal \n\nIn the above case, how would you design your agent\
    \ to prevent offering/declining a renewal offer based on things like race, orientation,\
    \ etc.?\n\nScenario 2: \n\nA Property Manager needs a weekly review of activity\
    \ in their property.\n\nArchitect Action:  \n\nThe agent should only include properties\
    \ that are under the purview of that manager. For simplicity, just assume there\
    \ is one property manager per apartment building, each in CA, OR, and WA.\n\n\
    Use data in Apartment, Lease Payment, and Case to generate a weekly summary.\n\
    \nExplain the difference between metered and unmetered Einstein actions. If you\
    \ schedule a weekly flow that generates tenant summaries using the Ops Copilot,\
    \ will it consume Flex Credits? How would you design this differently to minimize\
    \ costs?\n\nTask 5: Trust & Security  \n\nScenario 1: \n\nA potential tenant types,\
    \ \"My annual income is $100K and my SSN is 123-45-9876. Do I qualify for an apartment\
    \ in San Francisco?”\n\nArchitect Action: \n\nHow do you configure the Einstein\
    \ Trust Layer to handle these risks? - Data classification setting and object\
    \ level select the data classification field\n\nScenario 2: \n\nYou have two users,\
    \ Tom and Jerry, in your sales org. Tom is complaining that he cannot edit the\
    \ opportunity amount while Jerry can.\n\nArchitect Action:  \n\nExplain how you\
    \ would configure a 'Security' agent to compare permissions and explain the access\
    \ difference.\n\nTask 6: Testing, Monitoring & Deployment Strategy\n\nObjective:\
    \ Move the solution from Sandbox to Production.\n\nScenario: \n\nThe agents have\
    \ been built in a developer sandbox.\n\nArchitect Action:  \n\nExplain how you\
    \ would test the agent  \n\nExplain how you will show senior customer stakeholders\
    \ how your agents are performing \n\nPick any agent you built above and deploy\
    \ the agent from one sandbox to another and demo it works (Hint: If you need data\
    \ to support the agent like KM articles, Account/Contact info, etc., ensure that\
    \ it is available in the target org). It is recommended that you spin up a second\
    \ org with the same template and seed it with the same data as your main org to\
    \ simplicity"
