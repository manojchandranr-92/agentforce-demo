      pain: Uses 3+ systems to complete one workflow, no single view of relevant data
    - goals: Track team performance, approve requests quickly, get real-time dashboards
      name: Manager / Supervisor
      pain: Relies on weekly manual reports, no proactive alerts, limited drill-down
        capability
    - goals: Portfolio-level visibility, trend analysis, data-driven decisions
      name: Executive / Leadership
      pain: Aggregates data manually across teams, inconsistent KPI definitions, stale
        data
    - goals: Close more leases efficiently, provide excellent prospect experience,
        and focus on high-value sales activities rather than repetitive inquiries
      name: Sarah Chen — Leasing Agent
      pain: Spends 60% of time answering the same questions about pet policies, parking
        availability, and square footage instead of building relationships and closing
        deals
    - goals: Quickly report maintenance issues, get status updates on requests, and
        access building services without long wait times or frustration
